<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0a2540"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Globe wireframe -->
  <circle cx="160" cy="150" r="100" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1.5"/>
  <ellipse cx="160" cy="150" rx="100" ry="40" fill="none" stroke="rgba(56,189,248,0.12)" stroke-width="1.5"/>
  <ellipse cx="160" cy="150" rx="60" ry="100" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <ellipse cx="160" cy="150" rx="20" ry="100" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <line x1="60" y1="150" x2="260" y2="150" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <line x1="160" y1="50" x2="160" y2="250" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <!-- Globe highlight -->
  <circle cx="160" cy="150" r="100" fill="rgba(14,116,144,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1.5"/>
  <!-- Location dots on globe -->
  <circle cx="130" cy="120" r="5" fill="#0ea5e9"/>
  <circle cx="185" cy="140" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="155" cy="170" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="200" cy="115" r="3" fill="#7dd3fc" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="130" y1="120" x2="185" y2="140" stroke="rgba(56,189,248,0.35)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="185" y1="140" x2="155" y2="170" stroke="rgba(56,189,248,0.35)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Strategy cards on right -->
  <g transform="translate(300,45)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="260" height="52" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="52" rx="2" fill="#0ea5e9"/>
    <text x="16" y="20" font-family="sans-serif" font-size="10" fill="rgba(56,189,248,0.9)" font-weight="700" letter-spacing="1">MARKET ENTRY</text>
    <text x="16" y="38" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">510(k) pathway · Dallas hub</text>
    <!-- Card 2 -->
    <rect x="0" y="62" width="260" height="52" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
    <rect x="0" y="62" width="4" height="52" rx="2" fill="#7c3aed"/>
    <text x="16" y="82" font-family="sans-serif" font-size="10" fill="rgba(167,139,250,0.9)" font-weight="700" letter-spacing="1">SALES STRATEGY</text>
    <text x="16" y="100" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Internal team over resellers</text>
    <!-- Card 3 -->
    <rect x="0" y="124" width="260" height="52" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
    <rect x="0" y="124" width="4" height="52" rx="2" fill="#0891b2"/>
    <text x="16" y="144" font-family="sans-serif" font-size="10" fill="rgba(56,189,248,0.9)" font-weight="700" letter-spacing="1">POSITIONING</text>
    <text x="16" y="162" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Augmented intelligence framing</text>
    <!-- Card 4 -->
    <rect x="0" y="186" width="260" height="52" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
    <rect x="0" y="186" width="4" height="52" rx="2" fill="#f59e0b"/>
    <text x="16" y="206" font-family="sans-serif" font-size="10" fill="rgba(245,158,11,0.9)" font-weight="700" letter-spacing="1">LAUNCH</text>
    <text x="16" y="224" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Pilot ads · U.S. landing page</text>
  </g>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">Strategy · Go-to-Market · Healthcare AI · Market Entry</text>
</svg>
