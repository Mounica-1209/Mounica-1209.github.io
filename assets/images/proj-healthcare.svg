<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e4f6b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="520" cy="40" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="80" cy="260" r="90" fill="rgba(255,255,255,0.04)"/>
  <circle cx="520" cy="40" r="70" fill="rgba(255,255,255,0.04)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="40" cy="40" r="2"/><circle cx="80" cy="40" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="160" cy="40" r="2"/>
    <circle cx="40" cy="80" r="2"/><circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/>
    <circle cx="40" cy="120" r="2"/><circle cx="80" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/>
  </g>
  <!-- Document stack -->
  <rect x="180" y="80" width="110" height="140" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <rect x="170" y="88" width="110" height="140" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <rect x="160" y="96" width="110" height="140" rx="8" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Lines on document -->
  <rect x="172" y="116" width="70" height="6" rx="3" fill="rgba(255,255,255,0.5)"/>
  <rect x="172" y="130" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="172" y="142" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="172" y="154" width="85" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="172" y="166" width="60" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <!-- Medical cross badge -->
  <circle cx="250" cy="98" r="20" fill="#0891b2" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <rect x="244" y="90" width="12" height="16" rx="2" fill="white"/>
  <rect x="240" y="94" width="20" height="8" rx="2" fill="white"/>
  <!-- Accuracy meter -->
  <g transform="translate(340,80)">
    <text x="0" y="20" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="2">ACCURACY</text>
    <text x="0" y="65" font-family="sans-serif" font-size="48" font-weight="800" fill="white">90%</text>
    <rect x="0" y="75" width="170" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="0" y="75" width="153" height="6" rx="3" fill="#22d3ee"/>
    <text x="0" y="105" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">up from 65%</text>
    <text x="0" y="135" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="2">FORMATS HANDLED</text>
    <text x="0" y="165" font-family="sans-serif" font-size="40" font-weight="800" fill="white">30+</text>
  </g>
  <!-- Label -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.3)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">AI · NLP · OCR · Healthcare</text>
</svg>
