<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d1a3a"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="500" cy="60" r="160" fill="rgba(124,58,237,0.07)"/>
  <circle cx="80" cy="240" r="120" fill="rgba(79,70,229,0.06)"/>

  <!-- LEFT: Before/After visual -->
  <rect x="28" y="38" width="200" height="100" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Before label -->
  <rect x="36" y="46" width="50" height="18" rx="4" fill="rgba(255,255,255,0.12)"/>
  <text x="61" y="59" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">BEFORE</text>
  <!-- Vague hero text mockup -->
  <rect x="36" y="70" width="100" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="36" y="84" width="140" height="5" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="36" y="94" width="120" height="5" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="36" y="108" width="60" height="14" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="66" y="119" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">Work with us</text>

  <!-- Arrow between -->
  <text x="246" y="93" font-family="sans-serif" font-size="20" fill="rgba(124,58,237,0.8)" text-anchor="middle">→</text>

  <rect x="268" y="38" width="200" height="100" rx="8" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
  <!-- After label -->
  <rect x="276" y="46" width="44" height="18" rx="4" fill="url(#pill)"/>
  <text x="298" y="59" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">AFTER</text>
  <!-- GEO-optimised hero mockup -->
  <rect x="276" y="70" width="170" height="11" rx="3" fill="rgba(255,255,255,0.22)"/>
  <text x="361" y="80" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.7)" text-anchor="middle">Trusted Wealth Mgmt for Families &amp; Business Owners</text>
  <rect x="276" y="86" width="155" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="276" y="96" width="145" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="276" y="110" width="80" height="16" rx="6" fill="url(#pill)"/>
  <text x="316" y="122" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Find an Advisor</text>

  <!-- GEO Framework row -->
  <g transform="translate(28,155)">
    <text x="0" y="14" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="2" font-weight="600">GEO FRAMEWORK</text>
    <!-- 4 pillars -->
    <rect x="0" y="22" width="100" height="52" rx="7" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="50" y="42" font-family="sans-serif" font-size="10" font-weight="700" fill="#a78bfa" text-anchor="middle">Findability</text>
    <text x="50" y="57" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Headings · Links</text>
    <text x="50" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Metadata</text>

    <rect x="110" y="22" width="100" height="52" rx="7" fill="rgba(79,70,229,0.12)" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
    <text x="160" y="42" font-family="sans-serif" font-size="10" font-weight="700" fill="#818cf8" text-anchor="middle">Answerability</text>
    <text x="160" y="57" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">FAQs · Direct</text>
    <text x="160" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Paragraphs</text>

    <rect x="220" y="22" width="100" height="52" rx="7" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
    <text x="270" y="42" font-family="sans-serif" font-size="10" font-weight="700" fill="#34d399" text-anchor="middle">Authority</text>
    <text x="270" y="57" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Awards · Proof</text>
    <text x="270" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Credentials</text>

    <rect x="330" y="22" width="100" height="52" rx="7" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
    <text x="380" y="42" font-family="sans-serif" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">Consistency</text>
    <text x="380" y="57" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Cross-platform</text>
    <text x="380" y="68" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Messaging</text>

    <!-- Right: LLM visibility badge -->
    <rect x="442" y="14" width="128" height="62" rx="10" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.4)" stroke-width="1.5"/>
    <text x="506" y="36" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">LLM VISIBILITY</text>
    <text x="506" y="56" font-family="sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">6</text>
    <text x="506" y="70" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Recommendations</text>
  </g>

  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">GEO Strategy · AI Marketing · Brand · Product Management</text>
</svg>
