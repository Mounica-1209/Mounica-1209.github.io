<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Road surface -->
  <rect x="120" y="80" width="360" height="160" rx="4" fill="url(#road)"/>
  <!-- Road markings -->
  <rect x="290" y="95" width="20" height="35" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="290" y="145" width="20" height="35" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="290" y="195" width="20" height="35" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Pothole markers with detection boxes -->
  <ellipse cx="200" cy="160" rx="30" ry="18" fill="#1a1a1a"/>
  <ellipse cx="200" cy="160" rx="25" ry="14" fill="#111"/>
  <rect x="165" y="137" width="70" height="46" rx="3" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="200" y="133" font-family="sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">DETECTED</text>
  <circle cx="165" cy="137" r="4" fill="#f59e0b"/>
  <!-- Second pothole -->
  <ellipse cx="390" cy="200" rx="22" ry="13" fill="#1a1a1a"/>
  <ellipse cx="390" cy="200" rx="17" ry="9" fill="#111"/>
  <rect x="362" y="183" width="56" height="34" rx="3" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="390" y="179" font-family="sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">DETECTED</text>
  <!-- CV scan lines -->
  <line x1="120" y1="100" x2="480" y2="100" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <line x1="120" y1="115" x2="480" y2="115" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <line x1="120" y1="130" x2="480" y2="130" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <line x1="120" y1="145" x2="480" y2="145" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <line x1="120" y1="160" x2="480" y2="160" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <!-- Accuracy stat -->
  <rect x="20" y="80" width="85" height="70" rx="8" fill="rgba(0,0,0,0.4)"/>
  <text x="62" y="113" font-family="sans-serif" font-size="26" font-weight="800" fill="#f59e0b" text-anchor="middle">90%</text>
  <text x="62" y="132" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">ACCURACY</text>
  <!-- Savings stat -->
  <rect x="495" y="80" width="90" height="70" rx="8" fill="rgba(0,0,0,0.4)"/>
  <text x="540" y="110" font-family="sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">$150K</text>
  <text x="540" y="130" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">SAVED/YEAR</text>
  <!-- Decorative orbs -->
  <circle cx="560" cy="260" r="80" fill="rgba(245,158,11,0.06)"/>
  <circle cx="40" cy="40" r="60" fill="rgba(245,158,11,0.06)"/>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">Computer Vision · Deep Learning · Smart City</text>
</svg>
