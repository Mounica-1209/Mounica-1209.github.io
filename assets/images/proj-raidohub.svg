<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#022c22"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="120" cy="80" r="130" fill="rgba(16,185,129,0.07)"/>
  <circle cx="500" cy="200" r="100" fill="rgba(16,185,129,0.06)"/>
  <!-- Dot grid -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/><circle cx="350" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="350" cy="100" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="250" cy="200" r="2"/>
  </g>
  <!-- Prediction line chart -->
  <g transform="translate(30,50)">
    <!-- Axes -->
    <line x1="30" y1="160" x2="330" y2="160" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="30" y1="20" x2="30" y2="160" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <!-- Y-axis labels -->
    <text x="22" y="25" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">100K</text>
    <text x="22" y="65" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">75K</text>
    <text x="22" y="105" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">50K</text>
    <text x="22" y="145" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">25K</text>
    <!-- Grid lines -->
    <line x1="30" y1="25" x2="330" y2="25" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="30" y1="65" x2="330" y2="65" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="30" y1="105" x2="330" y2="105" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <!-- Actual data line (solid) -->
    <polyline points="30,130 75,115 120,100 165,90 210,75 255,85 300,70" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <!-- Model prediction line (dashed) -->
    <polyline points="30,133 75,118 120,103 165,88 210,78 255,83 300,68" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
    <!-- Area fill under actual -->
    <polygon points="30,130 75,115 120,100 165,90 210,75 255,85 300,70 300,160 30,160" fill="rgba(16,185,129,0.08)"/>
    <!-- Data points -->
    <circle cx="30" cy="130" r="4" fill="#10b981"/>
    <circle cx="75" cy="115" r="4" fill="#10b981"/>
    <circle cx="120" cy="100" r="4" fill="#10b981"/>
    <circle cx="165" cy="90" r="4" fill="#10b981"/>
    <circle cx="210" cy="75" r="4" fill="#10b981"/>
    <circle cx="255" cy="85" r="4" fill="#10b981"/>
    <circle cx="300" cy="70" r="4" fill="#10b981"/>
    <!-- X labels -->
    <text x="30" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Jan</text>
    <text x="75" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Feb</text>
    <text x="120" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Mar</text>
    <text x="165" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Apr</text>
    <text x="210" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">May</text>
    <text x="255" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Jun</text>
    <text x="300" y="175" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Jul</text>
    <!-- Legend -->
    <line x1="35" y1="195" x2="55" y2="195" stroke="#10b981" stroke-width="2.5"/>
    <text x="60" y="199" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Actual</text>
    <line x1="105" y1="195" x2="125" y2="195" stroke="#34d399" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="130" y="199" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">ML Model</text>
  </g>
  <!-- Stats panel -->
  <g transform="translate(395,45)">
    <!-- Accuracy badge -->
    <rect x="0" y="0" width="175" height="72" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
    <text x="88" y="32" font-family="sans-serif" font-size="38" font-weight="800" fill="#10b981" text-anchor="middle">95%</text>
    <text x="88" y="57" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">VALIDATION ACCURACY</text>

    <!-- Strategy cards -->
    <rect x="0" y="86" width="175" height="54" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="0" y="86" width="4" height="54" rx="2" fill="#10b981"/>
    <text x="14" y="107" font-family="sans-serif" font-size="9" fill="rgba(16,185,129,0.9)" font-weight="700" letter-spacing="1">SMALL AIRPORTS</text>
    <text x="14" y="127" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">3rd-party vendor data</text>

    <rect x="0" y="150" width="175" height="54" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="0" y="150" width="4" height="54" rx="2" fill="#34d399"/>
    <text x="14" y="171" font-family="sans-serif" font-size="9" fill="rgba(52,211,153,0.9)" font-weight="700" letter-spacing="1">LARGE AIRPORTS</text>
    <text x="14" y="191" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">Public data + estimation</text>
  </g>
  <!-- Airplane icon -->
  <text x="370" y="242" font-family="sans-serif" font-size="32" fill="rgba(16,185,129,0.2)">✈</text>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">ML Validation · Predictive Analytics · Airport Operations</text>
</svg>
