<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0c2340"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="rgba(6,182,212,0.7)"/>
    </marker>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <circle cx="520" cy="60" r="140" fill="rgba(8,145,178,0.06)"/>
  <circle cx="60" cy="240" r="110" fill="rgba(6,182,212,0.05)"/>

  <!-- Logo / Title area -->
  <rect x="22" y="22" width="110" height="36" rx="8" fill="rgba(8,145,178,0.18)" stroke="rgba(6,182,212,0.4)" stroke-width="1.5"/>
  <text x="77" y="38" font-family="sans-serif" font-size="11" font-weight="800" fill="#06b6d4" text-anchor="middle" letter-spacing="1">Thera</text>
  <text x="77" y="51" font-family="sans-serif" font-size="11" font-weight="800" fill="#10b981" text-anchor="middle" letter-spacing="1">Pay</text>

  <!-- Pipeline: 5 steps -->
  <!-- Step 1: Eligibility -->
  <rect x="22" y="76" width="96" height="62" rx="8" fill="rgba(8,145,178,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="70" y="98" font-family="sans-serif" font-size="9" font-weight="700" fill="#06b6d4" text-anchor="middle">Eligibility</text>
  <text x="70" y="112" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Real-time payer</text>
  <text x="70" y="124" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">API check</text>
  <line x1="120" y1="107" x2="136" y2="107" stroke="rgba(6,182,212,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Co-Pay -->
  <rect x="136" y="76" width="96" height="62" rx="8" fill="rgba(8,145,178,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="184" y="98" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">Co-Pay Est.</text>
  <text x="184" y="112" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Upfront digital</text>
  <text x="184" y="124" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">cost agreement</text>
  <line x1="234" y1="107" x2="250" y2="107" stroke="rgba(6,182,212,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: EMR Notes -->
  <rect x="250" y="76" width="96" height="62" rx="8" fill="rgba(8,145,178,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="298" y="98" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">SOAP Notes</text>
  <text x="298" y="112" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">EMR-linked</text>
  <text x="298" y="124" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">documentation</text>
  <line x1="348" y1="107" x2="364" y2="107" stroke="rgba(6,182,212,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Claims -->
  <rect x="364" y="76" width="96" height="62" rx="8" fill="rgba(8,145,178,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="412" y="98" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">837P Claims</text>
  <text x="412" y="112" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Auto-generated</text>
  <text x="412" y="124" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">batch submission</text>
  <line x1="462" y1="107" x2="478" y2="107" stroke="rgba(6,182,212,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Denial Mgmt -->
  <rect x="478" y="76" width="100" height="62" rx="8" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.35)" stroke-width="1.5"/>
  <text x="528" y="98" font-family="sans-serif" font-size="9" font-weight="700" fill="#34d399" text-anchor="middle">Denial Mgmt</text>
  <text x="528" y="112" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Alerts + guided</text>
  <text x="528" y="124" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">appeal workflows</text>

  <!-- PIPELINE LABEL -->
  <text x="300" y="158" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">END-TO-END RCM PIPELINE</text>

  <!-- Bottom: 4 strategy pillars -->
  <rect x="22" y="168" width="126" height="56" rx="8" fill="rgba(8,145,178,0.1)" stroke="rgba(6,182,212,0.22)" stroke-width="1"/>
  <text x="85" y="188" font-family="sans-serif" font-size="9" font-weight="700" fill="#06b6d4" text-anchor="middle">Vertical</text>
  <text x="85" y="201" font-family="sans-serif" font-size="9" font-weight="700" fill="#06b6d4" text-anchor="middle">Specialization</text>
  <text x="85" y="216" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">PT-specific workflows</text>

  <rect x="158" y="168" width="126" height="56" rx="8" fill="rgba(8,145,178,0.1)" stroke="rgba(6,182,212,0.22)" stroke-width="1"/>
  <text x="221" y="188" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">Operational</text>
  <text x="221" y="201" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">Excellence</text>
  <text x="221" y="216" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Automates billing tasks</text>

  <rect x="294" y="168" width="126" height="56" rx="8" fill="rgba(8,145,178,0.1)" stroke="rgba(6,182,212,0.22)" stroke-width="1"/>
  <text x="357" y="188" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">API-First</text>
  <text x="357" y="201" font-family="sans-serif" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="middle">Architecture</text>
  <text x="357" y="216" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Modular integrations</text>

  <!-- Right badge -->
  <rect x="432" y="162" width="146" height="68" rx="10" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
  <text x="505" y="183" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="1">TARGET MARKET</text>
  <text x="505" y="206" font-family="sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">38K</text>
  <text x="505" y="222" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">Outpatient PT Clinics · 60%</text>
  <text x="505" y="233" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle">small practices underserved</text>

  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">Digital Strategy · HealthTech · RCM · Product Digitalization · SMU Cox</text>
</svg>
