<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a2e"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(99,102,241,0.7)"/>
    </marker>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="100" cy="90" r="130" fill="rgba(99,102,241,0.07)"/>
  <circle cx="520" cy="210" r="110" fill="rgba(8,145,178,0.06)"/>

  <!-- PDF document icon -->
  <rect x="28" y="50" width="90" height="115" rx="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <rect x="28" y="50" width="90" height="28" rx="8" fill="rgba(99,102,241,0.25)" stroke="none"/>
  <rect x="28" y="64" width="90" height="14" fill="rgba(99,102,241,0.25)" stroke="none"/>
  <text x="73" y="69" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700">PDF</text>
  <!-- Doc lines -->
  <line x1="40" y1="92" x2="107" y2="92" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="103" x2="107" y2="103" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="114" x2="90" y2="114" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="125" x2="107" y2="125" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="136" x2="80" y2="136" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="147" x2="107" y2="147" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arrow to pipeline -->
  <text x="132" y="112" font-family="sans-serif" font-size="20" fill="rgba(99,102,241,0.6)">→</text>

  <!-- Pipeline boxes row 1 -->
  <g transform="translate(158,47)">
    <!-- Load -->
    <rect x="0" y="0" width="76" height="40" rx="7" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
    <text x="38" y="16" font-family="sans-serif" font-size="8" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">LOAD</text>
    <text x="38" y="30" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">PyPDFLoader</text>
    <line x1="76" y1="20" x2="90" y2="20" stroke="rgba(99,102,241,0.5)" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- Chunk -->
    <rect x="90" y="0" width="76" height="40" rx="7" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
    <text x="128" y="16" font-family="sans-serif" font-size="8" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">CHUNK</text>
    <text x="128" y="30" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">Recursive Split</text>
    <line x1="166" y1="20" x2="180" y2="20" stroke="rgba(99,102,241,0.5)" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- Embed -->
    <rect x="180" y="0" width="76" height="40" rx="7" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
    <text x="218" y="16" font-family="sans-serif" font-size="8" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">EMBED</text>
    <text x="218" y="30" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">Watsonx</text>
  </g>

  <!-- Pipeline boxes row 2 -->
  <g transform="translate(158,105)">
    <!-- Chroma -->
    <rect x="0" y="0" width="76" height="40" rx="7" fill="rgba(8,145,178,0.15)" stroke="rgba(8,145,178,0.4)" stroke-width="1.5"/>
    <text x="38" y="16" font-family="sans-serif" font-size="8" fill="rgba(103,232,249,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">CHROMA</text>
    <text x="38" y="30" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">Vector Store</text>
    <line x1="76" y1="20" x2="90" y2="20" stroke="rgba(8,145,178,0.5)" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- Retrieve -->
    <rect x="90" y="0" width="76" height="40" rx="7" fill="rgba(8,145,178,0.15)" stroke="rgba(8,145,178,0.4)" stroke-width="1.5"/>
    <text x="128" y="16" font-family="sans-serif" font-size="8" fill="rgba(103,232,249,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">RETRIEVE</text>
    <text x="128" y="30" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">Similarity Search</text>
    <line x1="166" y1="20" x2="180" y2="20" stroke="rgba(8,145,178,0.5)" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- LLM -->
    <rect x="180" y="0" width="76" height="40" rx="7" fill="rgba(8,145,178,0.2)" stroke="rgba(8,145,178,0.5)" stroke-width="1.5"/>
    <text x="218" y="16" font-family="sans-serif" font-size="8" fill="rgba(103,232,249,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">LLM ANSWER</text>
    <text x="218" y="30" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">Watsonx LLM</text>
  </g>

  <!-- RAG label -->
  <text x="296" y="168" font-family="sans-serif" font-size="9" fill="rgba(99,102,241,0.55)" text-anchor="middle" letter-spacing="3">RAG PIPELINE</text>

  <!-- Right panel -->
  <g transform="translate(468,47)">
    <rect x="0" y="0" width="110" height="52" rx="9" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
    <text x="55" y="24" font-family="sans-serif" font-size="20" font-weight="800" fill="#a78bfa" text-anchor="middle">DOC</text>
    <text x="55" y="42" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">INTELLIGENCE</text>

    <rect x="0" y="62" width="110" height="52" rx="9" fill="rgba(8,145,178,0.12)" stroke="rgba(8,145,178,0.3)" stroke-width="1.5"/>
    <text x="55" y="84" font-family="sans-serif" font-size="12" font-weight="700" fill="#67e8f9" text-anchor="middle">Semantic QA</text>
    <text x="55" y="102" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="1">CONTEXT-AWARE</text>

    <rect x="0" y="124" width="110" height="44" rx="9" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1.5"/>
    <text x="55" y="144" font-family="sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">Gradio UI</text>
    <text x="55" y="160" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">INTERACTIVE</text>
  </g>

  <!-- Decorative line -->
  <rect x="0" y="210" width="600" height="1" fill="rgba(255,255,255,0.05)"/>

  <!-- Tech tags -->
  <g transform="translate(28,222)">
    <rect x="0" y="0" width="76" height="22" rx="11" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="38" y="15" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle">LangChain</text>
    <rect x="84" y="0" width="60" height="22" rx="11" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="114" y="15" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle">ChromaDB</text>
    <rect x="152" y="0" width="54" height="22" rx="11" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="179" y="15" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle">Gradio</text>
    <rect x="214" y="0" width="76" height="22" rx="11" fill="rgba(8,145,178,0.12)" stroke="rgba(8,145,178,0.3)" stroke-width="1"/>
    <text x="252" y="15" font-family="sans-serif" font-size="9" fill="rgba(103,232,249,0.9)" text-anchor="middle">IBM watsonx</text>
    <rect x="298" y="0" width="52" height="22" rx="11" fill="rgba(8,145,178,0.12)" stroke="rgba(8,145,178,0.3)" stroke-width="1"/>
    <text x="324" y="15" font-family="sans-serif" font-size="9" fill="rgba(103,232,249,0.9)" text-anchor="middle">Python</text>
  </g>

  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">RAG · LangChain · ChromaDB · LLM · Personal Project</text>
</svg>
