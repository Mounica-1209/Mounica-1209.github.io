<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071a0e"/>
      <stop offset="100%" style="stop-color:#0c2318"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="pur" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="rgba(16,185,129,0.7)"/>
    </marker>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <circle cx="500" cy="50" r="160" fill="rgba(5,150,105,0.07)"/>
  <circle cx="80" cy="260" r="120" fill="rgba(16,185,129,0.04)"/>

  <!-- Title badge -->
  <rect x="20" y="18" width="190" height="30" rx="8" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.45)" stroke-width="1.5"/>
  <text x="115" y="38" font-family="sans-serif" font-size="10" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="1">AI NUTRITION COACH · MAS</text>

  <!-- RECIPE WORKFLOW label -->
  <text x="22" y="62" font-family="sans-serif" font-size="7.5" fill="rgba(16,185,129,0.6)" letter-spacing="2">RECIPE WORKFLOW</text>

  <!-- Node 1: Vision Agent -->
  <rect x="20" y="68" width="108" height="52" rx="8" fill="rgba(5,150,105,0.14)" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
