  <text x="22" y="136" font-family="sans-serif" font-size="7.5" fill="rgba(16,185,129,0.6)" letter-spacing="2">ANALYSIS WORKFLOW</text>

  <!-- Single node: Nutrient Analysis -->
  <rect x="20" y="142" width="200" height="52" rx="8" fill="rgba(5,150,105,0.12)" stroke="rgba(16,185,129,0.35)" stroke-width="1.5"/>
  <text x="120" y="161" font-family="sans-serif" font-size="8.5" font-weight="700" fill="#10b981" text-anchor="middle">Nutrient Analysis Agent</text>
  <text x="120" y="175" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">Llama 3.2-90B Vision · Calories · Macros</text>
  <text x="120" y="187" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">Vitamins · Minerals · Health Evaluation</text>

