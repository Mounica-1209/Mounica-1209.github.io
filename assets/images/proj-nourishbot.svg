  <text x="46" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">CrewAI</text>
  <rect x="80" y="236" width="72" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="116" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Llama 3.2-90B</text>
  <rect x="160" y="236" width="72" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="196" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">IBM Watsonx</text>
  <rect x="240" y="236" width="58" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="269" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Granite 3.1</text>
  <rect x="306" y="236" width="46" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="329" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Gradio</text>
  <rect x="360" y="236" width="50" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="385" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Pydantic</text>
  <rect x="418" y="236" width="76" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="456" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Multimodal AI</text>
  <rect x="502" y="236" width="82" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <text x="543" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">IBM Certificate</text>
  <text x="300" y="283" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">NourishBot · IBM RAG &amp; Agentic AI Professional Certificate</text>
</svg>
