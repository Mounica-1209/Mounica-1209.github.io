  <text x="489" y="110" font-family="sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle">4 Agents</text>
  <text x="489" y="127" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Ingredient Detection</text>
  <text x="489" y="140" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Dietary Filtering</text>
  <text x="489" y="153" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Nutrient Analysis</text>
  <text x="489" y="166" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Recipe Suggestion</text>
  <text x="489" y="186" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle" font-weight="700">Sequential Process</text>

