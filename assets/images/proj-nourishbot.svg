  <text x="74" y="100" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">Llama 3.2-90B</text>
  <text x="74" y="112" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">Ingredient detect</text>
  <line x1="130" y1="94" x2="144" y2="94" stroke="rgba(16,185,129,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2: Dietary Filter -->
  <rect x="144" y="68" width="108" height="52" rx="8" fill="rgba(5,150,105,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="198" y="87" font-family="sans-serif" font-size="8.5" font-weight="700" fill="#34d399" text-anchor="middle">Dietary Filter</text>
  <text x="198" y="100" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">IBM Granite 3.1</text>
  <text x="198" y="112" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">Restriction check</text>
  <line x1="254" y1="94" x2="268" y2="94" stroke="rgba(16,185,129,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3: Recipe Agent -->
  <rect x="268" y="68" width="108" height="52" rx="8" fill="rgba(124,58,237,0.12)" stroke="rgba(168,85,247,0.35)" stroke-width="1.5"/>
  <text x="322" y="87" font-family="sans-serif" font-size="8.5" font-weight="700" fill="#c084fc" text-anchor="middle">Recipe Agent</text>
  <text x="322" y="100" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">GPT-4o backed</text>
  <text x="322" y="112" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="middle">Creative suggestions</text>

