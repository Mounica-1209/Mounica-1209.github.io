<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(167,139,250,0.7)"/>
    </marker>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Background orbs -->
  <circle cx="100" cy="80" r="140" fill="rgba(124,58,237,0.08)"/>
  <circle cx="500" cy="220" r="120" fill="rgba(79,70,229,0.1)"/>
  <!-- Dot grid -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/><circle cx="350" cy="50" r="2"/><circle cx="400" cy="50" r="2"/><circle cx="450" cy="50" r="2"/><circle cx="500" cy="50" r="2"/><circle cx="550" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="350" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="450" cy="100" r="2"/><circle cx="500" cy="100" r="2"/><circle cx="550" cy="100" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="250" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="350" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="450" cy="200" r="2"/><circle cx="500" cy="200" r="2"/><circle cx="550" cy="200" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="100" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="200" cy="250" r="2"/><circle cx="250" cy="250" r="2"/><circle cx="300" cy="250" r="2"/><circle cx="350" cy="250" r="2"/><circle cx="400" cy="250" r="2"/><circle cx="450" cy="250" r="2"/><circle cx="500" cy="250" r="2"/><circle cx="550" cy="250" r="2"/>
  </g>
  <!-- Pipeline nodes row 1 (before - faded) -->
  <text x="300" y="38" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="3">OLD ARCHITECTURE</text>
  <g opacity="0.4">
    <rect x="60" y="55" width="80" height="44" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="100" y="82" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">Source</text>
    <line x1="140" y1="77" x2="175" y2="77" stroke="rgba(167,139,250,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="175" y="55" width="80" height="44" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="215" y="82" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">Process</text>
    <line x1="255" y1="77" x2="290" y2="77" stroke="rgba(167,139,250,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="290" y="55" width="80" height="44" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="330" y="82" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">Output</text>
    <text x="220" y="115" font-family="sans-serif" font-size="10" fill="rgba(255,100,100,0.7)" text-anchor="middle">1× capacity · bottleneck</text>
  </g>
  <!-- Divider -->
  <line x1="40" y1="130" x2="560" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="8,6"/>
  <!-- Pipeline nodes row 2 (after - bright) -->
  <text x="300" y="155" font-family="sans-serif" font-size="10" fill="rgba(167,139,250,0.8)" text-anchor="middle" letter-spacing="3">NEW ARCHITECTURE</text>
  <rect x="40" y="168" width="80" height="50" rx="8" fill="url(#node)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="80" y="195" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Ingest</text>
  <line x1="120" y1="193" x2="148" y2="193" stroke="rgba(167,139,250,0.7)" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="148" y="168" width="80" height="50" rx="8" fill="url(#node)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="188" y="195" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Validate</text>
  <line x1="228" y1="193" x2="256" y2="193" stroke="rgba(167,139,250,0.7)" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="256" y="168" width="80" height="50" rx="8" fill="url(#node)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="296" y="195" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Transform</text>
  <line x1="336" y1="193" x2="364" y2="193" stroke="rgba(167,139,250,0.7)" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="364" y="168" width="80" height="50" rx="8" fill="url(#node)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="404" y="195" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Serve</text>
  <!-- 3x badge -->
  <rect x="470" y="160" width="110" height="66" rx="10" fill="rgba(124,58,237,0.3)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
  <text x="525" y="188" font-family="sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">3×</text>
  <text x="525" y="212" font-family="sans-serif" font-size="10" fill="rgba(167,139,250,0.9)" text-anchor="middle" letter-spacing="1">CAPACITY</text>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">PySpark · Cloud Architecture · Scalability</text>
</svg>
