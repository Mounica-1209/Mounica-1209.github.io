  <text x="365" y="184" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">PDF, DOCX, TXT, MD</text>
  <text x="365" y="197" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">across multiple uploads</text>

  <rect x="440" y="148" width="138" height="58" rx="9" fill="rgba(5,150,105,0.12)" stroke="rgba(16,185,129,0.35)" stroke-width="1.5"/>
  <text x="509" y="165" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">OUTPERFORMS</text>
  <text x="509" y="184" font-family="sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle">GPT-4o</text>
  <text x="509" y="199" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">on document Q&amp;A tasks</text>

