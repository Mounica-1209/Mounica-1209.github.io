  <text x="80" y="96" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">BM25 + Vector</text>
  <text x="80" y="108" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Search (ChromaDB)</text>
  <line x1="142" y1="89" x2="158" y2="89" stroke="rgba(168,85,247,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2: Research Agent -->
  <rect x="158" y="62" width="120" height="54" rx="9" fill="rgba(124,58,237,0.11)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="218" y="82" font-family="sans-serif" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle">Research Agent</text>
  <text x="218" y="96" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Watsonx LLaMA</text>
  <text x="218" y="108" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Context-aware gen.</text>
  <line x1="280" y1="89" x2="296" y2="89" stroke="rgba(168,85,247,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3: Verification Agent -->
  <rect x="296" y="62" width="120" height="54" rx="9" fill="rgba(124,58,237,0.11)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="356" y="82" font-family="sans-serif" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle">Verification Agent</text>
  <text x="356" y="96" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Granite 3.1 — fact</text>
  <text x="356" y="108" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">check &amp; halluc. flag</text>
