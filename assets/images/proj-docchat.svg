  <text x="85" y="184" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">BM25 keyword + vector</text>
  <text x="85" y="197" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">semantic search combined</text>

  <rect x="160" y="148" width="130" height="58" rx="9" fill="rgba(124,58,237,0.1)" stroke="rgba(168,85,247,0.22)" stroke-width="1"/>
  <text x="225" y="168" font-family="sans-serif" font-size="8" font-weight="700" fill="#c084fc" text-anchor="middle">HALLUCINATION-FREE</text>
  <text x="225" y="184" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Every answer verified</text>
