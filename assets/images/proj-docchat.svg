  <text x="56" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">LangGraph</text>
  <rect x="100" y="236" width="58" height="18" rx="5" fill="rgba(124,58,237,0.2)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="129" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">Docling</text>
  <rect x="166" y="236" width="66" height="18" rx="5" fill="rgba(124,58,237,0.2)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="199" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">ChromaDB</text>
  <rect x="240" y="236" width="72" height="18" rx="5" fill="rgba(124,58,237,0.2)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="276" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">IBM Watsonx</text>
  <rect x="320" y="236" width="62" height="18" rx="5" fill="rgba(124,58,237,0.2)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="351" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">LangChain</text>
  <rect x="390" y="236" width="48" height="18" rx="5" fill="rgba(124,58,237,0.2)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="414" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">Gradio</text>
  <rect x="446" y="236" width="42" height="18" rx="5" fill="rgba(124,58,237,0.2)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="467" y="249" font-family="sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">BM25</text>
  <rect x="496" y="236" width="88" height="18" rx="5" fill="rgba(5,150,105,0.2)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <text x="540" y="249" font-family="sans-serif" font-size="8" fill="#34d399" text-anchor="middle">IBM Certificate</text>
  <text x="300" y="283" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">DocChat · IBM RAG &amp; Agentic AI Professional Certificate</text>
