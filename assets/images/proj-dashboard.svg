<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#831843"/>
      <stop offset="100%" style="stop-color:#4a0728"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Background glow -->
  <circle cx="300" cy="150" r="200" fill="rgba(244,63,94,0.07)"/>
  <!-- Dashboard panel -->
  <rect x="40" y="40" width="520" height="200" rx="12" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Dashboard header -->
  <rect x="40" y="40" width="520" height="36" rx="12" fill="rgba(0,0,0,0.2)"/>
  <circle cx="64" cy="58" r="6" fill="rgba(255,100,100,0.6)"/>
  <circle cx="82" cy="58" r="6" fill="rgba(255,200,50,0.6)"/>
  <circle cx="100" cy="58" r="6" fill="rgba(50,200,100,0.6)"/>
  <text x="300" y="63" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">CUSTOMER INACTIVITY INTELLIGENCE</text>
  <!-- Bar chart -->
  <g transform="translate(60,90)">
    <!-- Y axis -->
    <line x1="30" y1="0" x2="30" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- X axis -->
    <line x1="30" y1="130" x2="280" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Bars -->
    <rect x="45" y="45" width="28" height="85" rx="4" fill="url(#bar1)" opacity="0.8"/>
    <rect x="85" y="30" width="28" height="100" rx="4" fill="url(#bar1)" opacity="0.8"/>
    <rect x="125" y="60" width="28" height="70" rx="4" fill="url(#bar2)"/>
    <rect x="165" y="20" width="28" height="110" rx="4" fill="url(#bar1)" opacity="0.8"/>
    <rect x="205" y="50" width="28" height="80" rx="4" fill="url(#bar2)"/>
    <rect x="245" y="35" width="28" height="95" rx="4" fill="url(#bar1)" opacity="0.8"/>
    <!-- Labels -->
    <text x="59" y="148" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Jan</text>
    <text x="99" y="148" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Feb</text>
    <text x="139" y="148" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Mar</text>
    <text x="179" y="148" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Apr</text>
    <text x="219" y="148" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">May</text>
    <text x="259" y="148" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Jun</text>
    <text x="0" y="10" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">100K</text>
    <text x="0" y="50" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">60K</text>
    <text x="0" y="95" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">20K</text>
  </g>
  <!-- Stats panel on right -->
  <g transform="translate(370,90)">
    <rect x="0" y="0" width="170" height="55" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="12" y="22" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">TABLES UNIFIED</text>
    <text x="12" y="47" font-family="sans-serif" font-size="28" font-weight="800" fill="white">30+</text>

    <rect x="0" y="68" width="170" height="55" rx="8" fill="rgba(244,63,94,0.15)" stroke="rgba(244,63,94,0.3)" stroke-width="1"/>
    <text x="12" y="90" font-family="sans-serif" font-size="10" fill="rgba(255,150,180,0.8)" letter-spacing="1">DEFINITION</text>
    <text x="12" y="113" font-family="sans-serif" font-size="16" font-weight="700" fill="white">Unified ✓</text>
  </g>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">SQL · Tableau · Analytics · Business Intelligence</text>
</svg>
