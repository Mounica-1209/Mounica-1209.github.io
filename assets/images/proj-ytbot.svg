<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="80" cy="80" r="120" fill="rgba(124,58,237,0.08)"/>
  <circle cx="520" cy="220" r="100" fill="rgba(219,39,119,0.07)"/>

  <!-- YouTube play button icon -->
  <rect x="28" y="58" width="130" height="88" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="28" y="58" width="130" height="88" rx="16" fill="rgba(219,39,119,0.15)" stroke="rgba(219,39,119,0.3)" stroke-width="1.5"/>
  <polygon points="75,80 75,124 118,102" fill="rgba(255,255,255,0.85)"/>

  <!-- Arrow -->
  <text x="170" y="107" font-family="sans-serif" font-size="22" fill="rgba(124,58,237,0.7)">→</text>

  <!-- RAG pipeline boxes -->
  <g transform="translate(200,55)">
    <!-- Transcript box -->
    <rect x="0" y="0" width="78" height="42" rx="7" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.4)" stroke-width="1.5"/>
    <text x="39" y="17" font-family="sans-serif" font-size="8" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">TRANSCRIPT</text>
    <text x="39" y="31" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Extract</text>
    <!-- arrow -->
    <line x1="78" y1="21" x2="94" y2="21" stroke="rgba(167,139,250,0.6)" stroke-width="1.5" marker-end="url(#a)"/>
    <!-- Chunk box -->
    <rect x="94" y="0" width="78" height="42" rx="7" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.4)" stroke-width="1.5"/>
    <text x="133" y="17" font-family="sans-serif" font-size="8" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">CHUNK</text>
    <text x="133" y="31" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Split + Overlap</text>
    <!-- arrow -->
    <line x1="172" y1="21" x2="188" y2="21" stroke="rgba(167,139,250,0.6)" stroke-width="1.5"/>
    <!-- Embed box -->
    <rect x="188" y="0" width="78" height="42" rx="7" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.4)" stroke-width="1.5"/>
    <text x="227" y="17" font-family="sans-serif" font-size="8" fill="rgba(167,139,250,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">EMBED</text>
    <text x="227" y="31" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">SLATE-30M</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(200,115)">
    <!-- FAISS -->
    <rect x="0" y="0" width="78" height="42" rx="7" fill="rgba(219,39,119,0.15)" stroke="rgba(219,39,119,0.4)" stroke-width="1.5"/>
    <text x="39" y="17" font-family="sans-serif" font-size="8" fill="rgba(249,168,212,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">FAISS</text>
    <text x="39" y="31" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Vector Index</text>
    <!-- arrow -->
    <line x1="78" y1="21" x2="94" y2="21" stroke="rgba(249,168,212,0.5)" stroke-width="1.5"/>
    <!-- Retrieve -->
    <rect x="94" y="0" width="78" height="42" rx="7" fill="rgba(219,39,119,0.15)" stroke="rgba(219,39,119,0.4)" stroke-width="1.5"/>
    <text x="133" y="17" font-family="sans-serif" font-size="8" fill="rgba(249,168,212,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">RETRIEVE</text>
    <text x="133" y="31" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Top-k Chunks</text>
    <!-- arrow -->
    <line x1="172" y1="21" x2="188" y2="21" stroke="rgba(249,168,212,0.5)" stroke-width="1.5"/>
    <!-- LLM -->
    <rect x="188" y="0" width="78" height="42" rx="7" fill="rgba(219,39,119,0.2)" stroke="rgba(219,39,119,0.5)" stroke-width="1.5"/>
    <text x="227" y="17" font-family="sans-serif" font-size="8" fill="rgba(249,168,212,0.9)" text-anchor="middle" font-weight="700" letter-spacing="1">LLM</text>
    <text x="227" y="31" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Grounded Answer</text>
  </g>

  <!-- RAG label -->
  <text x="350" y="182" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.6)" text-anchor="middle" letter-spacing="3">RAG PIPELINE</text>

  <!-- Right panel: stats -->
  <g transform="translate(468,55)">
    <rect x="0" y="0" width="112" height="52" rx="9" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
    <text x="56" y="24" font-family="sans-serif" font-size="22" font-weight="800" fill="#a78bfa" text-anchor="middle">RAG</text>
    <text x="56" y="42" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">ARCHITECTURE</text>

    <rect x="0" y="64" width="112" height="52" rx="9" fill="rgba(219,39,119,0.12)" stroke="rgba(219,39,119,0.3)" stroke-width="1.5"/>
    <text x="56" y="87" font-family="sans-serif" font-size="14" font-weight="700" fill="#f9a8d4" text-anchor="middle">No Hallucination</text>
    <text x="56" y="105" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="1">GROUNDED OUTPUT</text>
  </g>

  <!-- Bottom decorative line -->
  <rect x="0" y="210" width="600" height="1" fill="rgba(255,255,255,0.05)"/>

  <!-- Tech tags row -->
  <g transform="translate(28,222)">
    <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="36" y="15" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle">LangChain</text>
    <rect x="80" y="0" width="52" height="22" rx="11" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="106" y="15" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle">FAISS</text>
    <rect x="140" y="0" width="54" height="22" rx="11" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="167" y="15" font-family="sans-serif" font-size="9" fill="rgba(167,139,250,0.9)" text-anchor="middle">Gradio</text>
    <rect x="202" y="0" width="76" height="22" rx="11" fill="rgba(219,39,119,0.12)" stroke="rgba(219,39,119,0.3)" stroke-width="1"/>
    <text x="240" y="15" font-family="sans-serif" font-size="9" fill="rgba(249,168,212,0.9)" text-anchor="middle">IBM watsonx</text>
    <rect x="286" y="0" width="52" height="22" rx="11" fill="rgba(219,39,119,0.12)" stroke="rgba(219,39,119,0.3)" stroke-width="1"/>
    <text x="312" y="15" font-family="sans-serif" font-size="9" fill="rgba(249,168,212,0.9)" text-anchor="middle">Python</text>
  </g>

  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">RAG · LangChain · FAISS · LLM · Personal Project</text>
</svg>
