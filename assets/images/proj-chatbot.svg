<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="slack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a154b"/>
      <stop offset="100%" style="stop-color:#611f69"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="150" cy="150" r="140" fill="rgba(99,102,241,0.07)"/>
  <circle cx="470" cy="100" r="100" fill="rgba(16,185,129,0.06)"/>
  <!-- Slack-style chat window -->
  <rect x="30" y="30" width="260" height="225" rx="12" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Window header -->
  <rect x="30" y="30" width="260" height="38" rx="12" fill="rgba(74,21,75,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="54" cy="49" r="10" fill="rgba(255,255,255,0.15)"/>
  <text x="54" y="54" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">#</text>
  <text x="72" y="53" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" font-weight="600">it-helpdesk</text>
  <circle cx="274" cy="49" r="5" fill="#2eb67d"/>
  <!-- Chat bubbles - user -->
  <rect x="45" y="82" width="160" height="30" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="125" y="101" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Reset my password</text>
  <!-- Bot reply -->
  <rect x="45" y="122" width="195" height="42" rx="8" fill="rgba(46,182,125,0.15)" stroke="rgba(46,182,125,0.25)" stroke-width="1"/>
  <text x="58" y="139" font-family="sans-serif" font-size="10" fill="#2eb67d" font-weight="600">🤖 IT Bot</text>
  <text x="58" y="155" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Sending secure reset link...</text>
  <!-- User -->
  <rect x="45" y="176" width="145" height="30" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="118" y="195" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">New hire onboarding?</text>
  <!-- Bot reply -->
  <rect x="45" y="216" width="210" height="30" rx="8" fill="rgba(46,182,125,0.15)" stroke="rgba(46,182,125,0.25)" stroke-width="1"/>
  <text x="58" y="235" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Here's your setup guide 📋</text>
  <!-- Phase diagram on right -->
  <g transform="translate(320,35)">
    <text x="125" y="18" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">PHASED DELIVERY</text>
    <!-- Phase 1 -->
    <rect x="0" y="28" width="250" height="66" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
    <rect x="0" y="28" width="4" height="66" rx="2" fill="#10b981"/>
    <text x="16" y="50" font-family="sans-serif" font-size="10" fill="rgba(16,185,129,0.9)" font-weight="700" letter-spacing="1">PHASE 1 — DELIVERED</text>
    <text x="16" y="68" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">Password Reset via Slack</text>
    <text x="16" y="84" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Secure cloud integration · Priority delivery</text>
    <!-- Phase 2 -->
    <rect x="0" y="106" width="250" height="66" rx="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
    <rect x="0" y="106" width="4" height="66" rx="2" fill="#6366f1"/>
    <text x="16" y="128" font-family="sans-serif" font-size="10" fill="rgba(129,140,248,0.9)" font-weight="700" letter-spacing="1">PHASE 2 — DELIVERED</text>
    <text x="16" y="146" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">Employee Onboarding Bot</text>
    <text x="16" y="162" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Policies · Setup guides · FAQs</text>
    <!-- Accuracy -->
    <rect x="0" y="185" width="118" height="62" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
    <text x="59" y="214" font-family="sans-serif" font-size="30" font-weight="800" fill="#10b981" text-anchor="middle">92%</text>
    <text x="59" y="237" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">ACCURACY</text>
    <!-- Follow-on value -->
    <rect x="130" y="185" width="120" height="62" rx="10" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.35)" stroke-width="1.5"/>
    <text x="190" y="210" font-family="sans-serif" font-size="22" font-weight="800" fill="#f59e0b" text-anchor="middle">$3M</text>
    <text x="190" y="232" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">FOLLOW-ON</text>
  </g>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">Conversational AI · Slack · Cloud Integration · NLP</text>
</svg>
