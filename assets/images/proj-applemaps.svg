<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Map grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
  </g>
  <!-- Road paths -->
  <path d="M 0 150 Q 150 130 300 155 Q 450 175 600 160" stroke="rgba(255,255,255,0.12)" stroke-width="18" fill="none"/>
  <path d="M 0 150 Q 150 130 300 155 Q 450 175 600 160" stroke="rgba(255,255,255,0.07)" stroke-width="20" fill="none"/>
  <path d="M 0 150 Q 150 130 300 155 Q 450 175 600 160" stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none" stroke-dasharray="20,15"/>
  <!-- Cross road -->
  <path d="M 300 0 L 300 300" stroke="rgba(255,255,255,0.1)" stroke-width="16" fill="none"/>
  <!-- Location pins -->
  <g transform="translate(180,95)">
    <path d="M0-22 C-12-22-22-12-22 0 C-22 15 0 38 0 38 C0 38 22 15 22 0 C22-12 12-22 0-22z" fill="#00d4ff" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="white"/>
  </g>
  <g transform="translate(420,140)">
    <path d="M0-18 C-10-18-18-10-18 0 C-18 12 0 30 0 30 C0 30 18 12 18 0 C18-10 10-18 0-18z" fill="#7c3aed" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="white"/>
  </g>
  <!-- Route line between pins -->
  <path d="M 180 95 Q 280 60 420 140" stroke="#00d4ff" stroke-width="2.5" fill="none" stroke-dasharray="8,6" opacity="0.7"/>
  <!-- Cycle time comparison -->
  <rect x="30" y="30" width="140" height="80" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="50" y="55" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">BEFORE</text>
  <text x="50" y="85" font-family="sans-serif" font-size="30" font-weight="800" fill="rgba(255,100,100,0.9)">4wk</text>
  <rect x="30" y="125" width="140" height="80" rx="10" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="50" y="150" font-family="sans-serif" font-size="10" fill="rgba(0,212,255,0.8)" letter-spacing="1">AFTER</text>
  <text x="50" y="180" font-family="sans-serif" font-size="30" font-weight="800" fill="#00d4ff">8d</text>
  <!-- Hours saved badge -->
  <rect x="450" y="30" width="130" height="70" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="515" y="57" font-family="sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">64h</text>
  <text x="515" y="75" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">SAVED / MONTH</text>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.35)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">GIS · Automation · Data Engineering · Cloud</text>
</svg>
