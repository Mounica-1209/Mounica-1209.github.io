<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a2e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="rgba(139,92,246,0.8)"/>
    </marker>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <circle cx="100" cy="80" r="130" fill="rgba(139,92,246,0.06)"/>
  <circle cx="500" cy="220" r="110" fill="rgba(79,70,229,0.06)"/>
  <!-- PDF stack -->
  <rect x="22" y="62" width="72" height="90" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="30" y="54" width="72" height="90" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="38" y="46" width="72" height="90" rx="6" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
  <!-- PDF label -->
  <text x="74" y="75" font-family="sans-serif" font-size="13" font-weight="800" fill="#a78bfa" text-anchor="middle">PDF</text>
  <rect x="50" y="82" width="48" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="50" y="92" width="40" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="50" y="102" width="44" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="50" y="112" width="36" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
  <text x="74" y="152" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">DOCUMENT</text>
  <!-- Arrow -->
  <line x1="112" y1="91" x2="132" y2="91" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PyPDFLoader -->
  <rect x="132" y="68" width="92" height="46" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="178" y="89" font-family="sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">PyPDFLoader</text>
  <text x="178" y="104" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">text extraction</text>
  <text x="178" y="126" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">LOAD</text>
  <!-- Arrow -->
  <line x1="226" y1="91" x2="246" y2="91" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Chunker -->
  <rect x="246" y="62" width="96" height="58" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="254" y="70" width="80" height="9" rx="3" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <rect x="254" y="84" width="80" height="9" rx="3" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <rect x="254" y="98" width="80" height="9" rx="3" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="294" y="133" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">CHUNKS</text>
  <!-- Arrow -->
  <line x1="344" y1="91" x2="364" y2="91" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Chroma -->
  <rect x="364" y="60" width="96" height="62" rx="8" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <text x="412" y="82" font-family="sans-serif" font-size="12" font-weight="700" fill="#a78bfa" text-anchor="middle">ChromaDB</text>
  <g transform="translate(376,88)">
    <circle cx="8" cy="8" r="5" fill="rgba(139,92,246,0.5)"/>
    <circle cx="22" cy="4" r="5" fill="rgba(139,92,246,0.4)"/>
    <circle cx="36" cy="9" r="5" fill="rgba(139,92,246,0.5)"/>
    <circle cx="50" cy="5" r="5" fill="rgba(139,92,246,0.35)"/>
    <circle cx="64" cy="8" r="5" fill="rgba(139,92,246,0.45)"/>
  </g>
  <text x="412" y="133" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">VECTOR DB</text>
  <!-- Arrow -->
  <line x1="460" y1="91" x2="480" y2="91" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Watsonx -->
  <rect x="480" y="58" width="100" height="66" rx="8" fill="rgba(79,70,229,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
  <text x="530" y="80" font-family="sans-serif" font-size="10" font-weight="700" fill="#818cf8" text-anchor="middle">Watsonx</text>
  <text x="530" y="96" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">LLM +</text>
  <text x="530" y="110" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Embeddings</text>
  <text x="530" y="135" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">GENERATE</text>
  <!-- Bottom section -->
  <!-- User question -->
  <rect x="38" y="175" width="200" height="44" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="58" y="195" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">❓ "What does section 3 say</text>
  <text x="58" y="210" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">    about compliance?"</text>
  <!-- Arrow right -->
  <line x1="240" y1="197" x2="265" y2="197" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- RetrievalQA -->
  <rect x="265" y="166" width="180" height="60" rx="10" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <text x="355" y="190" font-family="sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">RetrievalQA Chain</text>
  <text x="355" y="208" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Similarity search → LLM answer</text>
  <!-- Arrow right -->
  <line x1="447" y1="197" x2="467" y2="197" stroke="rgba(139,92,246,0.6)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Answer -->
  <rect x="467" y="168" width="115" height="56" rx="8" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1.5"/>
  <text x="524" y="190" font-family="sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">✓ Grounded</text>
  <text x="524" y="206" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Answer</text>
  <text x="524" y="218" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">via Gradio UI</text>
  <!-- Label bar -->
  <rect x="0" y="262" width="600" height="38" fill="rgba(0,0,0,0.4)"/>
  <text x="20" y="286" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600" letter-spacing="1">RAG · ChromaDB · LangChain · IBM Watsonx · PDF Q&amp;A</text>
</svg>
